<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Free attendance calculator for students. Calculate current attendance, classes needed to reach your target and how many classes you can miss.">

  <title>Attendance Calculator | Student Tools</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #17191d;
      --muted: #737b8c;
      --border: #e6e9ef;
      --input: #f7f9fc;
      --primary: #1a73e8;
      --primary-soft: #e8f0fe;
      --success: #16884a;
      --success-soft: #e8f7ef;
      --danger: #d93025;
      --danger-soft: #fce8e6;
      --warning: #b06000;
      --warning-soft: #fff4df;
      --shadow: 0 18px 50px rgba(31, 45, 61, 0.10);
    }

    body.dark {
      --bg: #101216;
      --card: #1a1d23;
      --text: #f5f7fa;
      --muted: #a4acb9;
      --border: #2b3039;
      --input: #22262e;
      --primary-soft: #243b5e;
      --success-soft: #173b2a;
      --danger-soft: #44211f;
      --warning-soft: #44331b;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.30);
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: 0.25s;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 900px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 26px;
      font-weight: 800;
    }

    .brand span {
      color: var(--primary);
    }

    .theme-btn {
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 50%;
      background: var(--input);
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
    }

    main {
      max-width: 760px;
      margin: auto;
      padding: 35px 18px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.6;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .field {
      margin-bottom: 19px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input,
    select {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--input);
      color: var(--text);
      font-size: 17px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .calculate-btn {
      width: 100%;
      border: 0;
      border-radius: 15px;
      padding: 16px;
      background: var(--primary);
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .error {
      display: none;
      margin-top: 18px;
      padding: 15px;
      border-radius: 14px;
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 700;
      line-height: 1.5;
    }

    .results {
      display: none;
      margin-top: 24px;
    }

    .results.show {
      display: block;
    }

    .attendance-result {
      text-align: center;
      padding: 25px 18px;
      border-radius: 20px;
      background: var(--primary-soft);
      margin-bottom: 14px;
    }

    .attendance-result.success {
      background: var(--success-soft);
    }

    .attendance-result.danger {
      background: var(--danger-soft);
    }

    .small-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 8px;
    }

    .percentage {
      font-size: 44px;
      font-weight: 800;
      color: var(--primary);
    }

    .attendance-result.success .percentage {
      color: var(--success);
    }

    .attendance-result.danger .percentage {
      color: var(--danger);
    }

    .status {
      margin-top: 8px;
      font-weight: 700;
      line-height: 1.5;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-box {
      padding: 20px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--input);
    }

    .info-box.full {
      grid-column: 1 / -1;
    }

    .info-title {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .info-value {
      font-size: 25px;
      font-weight: 800;
    }

    .info-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 7px;
    }

    .warning-box {
      background: var(--warning-soft);
    }

    .success-box {
      background: var(--success-soft);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      color: var(--muted);
      margin-top: 35px;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 28px;
      }

      .card {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .brand {
        font-size: 23px;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .info-box.full {
        grid-column: auto;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="brand"><span>Student</span> Tools</div>

    <button
      class="theme-btn"
      onclick="toggleTheme()"
      id="themeButton"
      aria-label="Change theme"
    >
      🌙
    </button>
  </div>
</header>

<main>

  <div class="hero">
    <h1>Attendance Calculator</h1>

    <p>
      Check your current attendance, reach your target
      and know how many classes you can safely miss.
    </p>
  </div>

  <div class="card">

    <div class="field">
      <label for="totalClasses">Total Classes Conducted</label>

      <input
        type="number"
        id="totalClasses"
        placeholder="Example: 100"
        min="1"
        step="1"
        inputmode="numeric"
      >
    </div>

    <div class="field">
      <label for="attendedClasses">Classes Attended</label>

      <input
        type="number"
        id="attendedClasses"
        placeholder="Example: 76"
        min="0"
        step="1"
        inputmode="numeric"
      >
    </div>

    <div class="field">
      <label for="targetAttendance">Target Attendance</label>

      <select id="targetAttendance">
        <option value="70">70%</option>
        <option value="75" selected>75%</option>
        <option value="80">80%</option>
        <option value="85">85%</option>
        <option value="90">90%</option>
        <option value="95">95%</option>
      </select>
    </div>

    <button class="calculate-btn" onclick="calculateAttendance()">
      Calculate Attendance
    </button>

    <div class="error" id="errorBox"></div>

    <div class="results" id="results">

      <div class="attendance-result" id="attendanceResult">
        <div class="small-label">Current Attendance</div>

        <div class="percentage" id="attendancePercentage">
          0%
        </div>

        <div class="status" id="attendanceStatus"></div>
      </div>

      <div class="info-grid">

        <div class="info-box">
          <div class="info-title">Classes Attended</div>

          <div class="info-value" id="attendedResult">
            0
          </div>
        </div>

        <div class="info-box">
          <div class="info-title">Classes Missed</div>

          <div class="info-value" id="missedResult">
            0
          </div>
        </div>

        <div class="info-box full" id="targetBox">
          <div class="info-title" id="targetTitle">
            Target Analysis
          </div>

          <div class="info-value" id="targetValue">
            0
          </div>

          <div class="info-note" id="targetNote"></div>
        </div>

      </div>

    </div>

  </div>

  <a href="index.html" class="back-link">
    ← Back to Smart Calculator
  </a>

  <div class="footer">
    Fast • Free • Made for Students
  </div>

</main>

<script>
  function calculateAttendance() {
    const totalInput =
      document.getElementById("totalClasses").value;

    const attendedInput =
      document.getElementById("attendedClasses").value;

    const target =
      Number(document.getElementById("targetAttendance").value);

    const total = Number(totalInput);
    const attended = Number(attendedInput);

    const errorBox = document.getElementById("errorBox");
    const results = document.getElementById("results");

    errorBox.style.display = "none";
    results.classList.remove("show");

    if (
      totalInput === "" ||
      attendedInput === "" ||
      !Number.isFinite(total) ||
      !Number.isFinite(attended)
    ) {
      showError("Please enter total classes and attended classes.");
      return;
    }

    if (
      !Number.isInteger(total) ||
      !Number.isInteger(attended)
    ) {
      showError("Class values must be whole numbers.");
      return;
    }

    if (total <= 0) {
      showError("Total classes must be greater than zero.");
      return;
    }

    if (attended < 0) {
      showError("Classes attended cannot be negative.");
      return;
    }

    if (attended > total) {
      showError(
        "Classes attended cannot be greater than total classes."
      );

      return;
    }

    const missed = total - attended;

    const attendance =
      (attended / total) * 100;

    document.getElementById(
      "attendancePercentage"
    ).textContent = formatPercentage(attendance);

    document.getElementById(
      "attendedResult"
    ).textContent = attended;

    document.getElementById(
      "missedResult"
    ).textContent = missed;

    const attendanceResult =
      document.getElementById("attendanceResult");

    const attendanceStatus =
      document.getElementById("attendanceStatus");

    const targetBox =
      document.getElementById("targetBox");

    const targetTitle =
      document.getElementById("targetTitle");

    const targetValue =
      document.getElementById("targetValue");

    const targetNote =
      document.getElementById("targetNote");

    attendanceResult.classList.remove(
      "success",
      "danger"
    );

    targetBox.classList.remove(
      "success-box",
      "warning-box"
    );

    if (attendance >= target) {
      attendanceResult.classList.add("success");

      attendanceStatus.textContent =
        "You are currently meeting your " +
        target +
        "% attendance target.";

      const targetRatio = target / 100;

      const safeMisses = Math.max(
        0,
        Math.floor(attended / targetRatio - total)
      );

      targetBox.classList.add("success-box");

      targetTitle.textContent =
        "Classes You Can Safely Miss";

      targetValue.textContent = safeMisses;

      if (safeMisses === 0) {
        targetNote.textContent =
          "Attend the next class to protect your " +
          target +
          "% target.";
      } else if (safeMisses === 1) {
        targetNote.textContent =
          "You can miss 1 upcoming class and still maintain at least " +
          target +
          "% attendance.";
      } else {
        targetNote.textContent =
          "You can miss " +
          safeMisses +
          " upcoming classes and still maintain at least " +
          target +
          "% attendance.";
      }
    } else {
      attendanceResult.classList.add("danger");

      attendanceStatus.textContent =
        "You are below your " +
        target +
        "% attendance target.";

      const targetRatio = target / 100;

      const classesNeeded = Math.ceil(
        (targetRatio * total - attended) /
        (1 - targetRatio)
      );

      targetBox.classList.add("warning-box");

      targetTitle.textContent =
        "Classes You Must Attend";

      targetValue.textContent = Math.max(
        0,
        classesNeeded
      );

      if (classesNeeded === 1) {
        targetNote.textContent =
          "Attend the next 1 class without missing to reach at least " +
          target +
          "% attendance.";
      } else {
        targetNote.textContent =
          "Attend the next " +
          classesNeeded +
          " classes continuously to reach at least " +
          target +
          "% attendance.";
      }
    }

    results.classList.add("show");
  }

  function showError(message) {
    const errorBox = document.getElementById("errorBox");

    errorBox.textContent = message;
    errorBox.style.display = "block";
  }

  function formatPercentage(number) {
    return (
      Number(number.toFixed(2))
        .toLocaleString() + "%"
    );
  }

  function toggleTheme() {
    document.body.classList.toggle("dark");

    const button =
      document.getElementById("themeButton");

    if (document.body.classList.contains("dark")) {
      button.textContent = "☀️";

      localStorage.setItem(
        "theme",
        "dark"
      );
    } else {
      button.textContent = "🌙";

      localStorage.setItem(
        "theme",
        "light"
      );
    }
  }

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");

    document.getElementById(
      "themeButton"
    ).textContent = "☀️";
  }
</script>

</body>
        </html>
